<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CARA PRO ERP</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  background: #1e293b;
  padding: 15px;
  text-align: center;
}

.container {
  padding: 15px;
}

textarea {
  width: 100%;
  height: 80px;
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  background: #2563eb;
  color: white;
  border: none;
}

.card {
  background: #1e293b;
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>🧠 CARA PRO ERP REAL</header>

<div class="container">

<h3>📦 Importados (ej: 2 impresoras 150 USD c/u)</h3>
<textarea id="importados"></textarea>

<h3>🟩 Locales (ej: 2 CPU 40 USD c/u)</h3>
<textarea id="locales"></textarea>

<h3>🔧 Servicios (ej: 2 instalación 2000 CUP c/u)</h3>
<textarea id="servicios"></textarea>

<button onclick="generar()">GENERAR SISTEMA</button>

<div id="out"></div>

</div>

<script>

function parseItems(text) {
    let total = 0;
    let lines = text.split("\n");

    lines.forEach(l => {
        let nums = l.match(/(\d+)\s.*?(\d+(\.\d+)?)/);
        if(nums){
            let qty = parseFloat(nums[1]);
            let price = parseFloat(nums[2]);
            total += qty * price;
        }
    });

    return total;
}

function generar() {

    let imp = parseItems(document.getElementById("importados").value);
    let loc = parseItems(document.getElementById("locales").value);
    let ser = parseItems(document.getElementById("servicios").value);

    let subtotal = imp + loc + ser;

    let onat = subtotal * 0.15;
    let total = subtotal - onat;

    let usd = total / 490;

    document.getElementById("out").innerHTML = `

    <div class="card">
      <h3>🧾 FACTURA CLIENTE</h3>
      Subtotal: ${subtotal.toFixed(0)} CUP<br>
      ONAT (-15%): ${onat.toFixed(0)} CUP<br>
      TOTAL: ${total.toFixed(0)} CUP<br>
      USD: ${usd.toFixed(2)}
    </div>

    <div class="card">
      <h3>📊 FICHA DE COSTOS</h3>
      Importados: ${imp.toFixed(0)}<br>
      Locales: ${loc.toFixed(0)}<br>
      Servicios: ${ser.toFixed(0)}
    </div>

    <div class="card">
      <h3>🛠 ORDEN DE TRABAJO</h3>
      Procesar equipos según listado<br>
      Instalación y verificación técnica
    </div>

    <div class="card">
      <h3>📋 CONFORMIDAD</h3>
      Cliente acepta el trabajo realizado
    </div>

    `;

}

</script>

</body>
</html>
